[project]
name = "rvc-beta"
version = "0.1.0"
description = "RVC WebUI - VITSベースの音声変換フレームワーク"
authors = [{name = "lj1995"}]
license = {text = "MIT"}
requires-python = ">=3.12"
dependencies = [
    # コア
    "joblib>=1.1.0",
    "numba>=0.60.0",
    "numpy>=1.26.0,<2.0",
    "scipy>=1.13.0",
    "librosa>=0.10.2",
    "faiss-cpu>=1.8.0",
    "Cython>=3.0.11",

    # 音声処理
    "pydub>=0.25.1",
    "soundfile>=0.12.1",
    "ffmpeg-python>=0.2.0",
    "ffmpy==0.3.1",
    "praat-parselmouth>=0.4.2",
    "pyworld>=0.3.4",
    "resampy>=0.4.2",
    "audioread>=3.0.1",
    "av>=12.3.0",
    "noisereduce>=2.0.0",

    # 機械学習
    "torch==2.4.0",
    "torchaudio==2.4.0",
    "torchvision==0.19.0",
    "scikit-learn>=1.5.0",
    "tensorboard>=2.17.0",
    "tensorboardX>=2.6.0",
    "torchcrepe==0.0.20",
    "torchfcpe>=0.0.4",
    "onnxruntime-gpu>=1.18.0",
    "fairseq>=0.12.2",

    # WebUI
    "gradio==3.34.0",
    "Jinja2>=3.1.2",
    "Markdown>=3.6",
    "Werkzeug>=2.2.3",

    # リアルタイムGUI
    "PySimpleGUI>=4.60.0",
    "sounddevice<0.5.0",
    "flask>=2.0.0",
    "flask-cors>=3.0.0",
    "einops>=0.6.0",
    "local-attention>=1.0.0",
    "gin-config>=0.5.0",

    # API
    "fastapi==0.88",
    "uvicorn>=0.21.1",
    "httpx>=0.27.0",

    # ユーティリティ
    "json5>=0.9.25",
    "matplotlib>=3.7.0",
    "matplotlib-inline>=0.1.3",
    "Pillow>=9.1.1",
    "tqdm>=4.63.1",
    "tornado>=6.1",
    "uc-micro-py>=1.0.1",
    "sympy>=1.11.1",
    "tabulate>=0.8.10",
    "PyYAML>=6.0",
    "pyasn1>=0.4.8",
    "pyasn1-modules>=0.2.8",
    "fsspec>=2022.11.0",
    "absl-py>=1.2.0",
    "colorama>=0.4.5",
    "python-dotenv>=1.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[[tool.uv.index]]
name = "pytorch-cu124"
url = "https://download.pytorch.org/whl/cu124"
explicit = true

[tool.uv.sources]
torch = [{index = "pytorch-cu124"}]
torchvision = [{index = "pytorch-cu124"}]
torchaudio = [{index = "pytorch-cu124"}]
fairseq = {git = "https://github.com/One-sixth/fairseq.git"}
