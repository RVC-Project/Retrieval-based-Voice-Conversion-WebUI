<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; connect-src ws://127.0.0.1:*; style-src 'self'; font-src 'self'; img-src 'self' data:" />
  <title>RVC Realtime Voice Conversion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="aurora" aria-hidden="true"></div>

  <div id="banner" class="banner hidden" role="alert">
    <svg class="banner-icon" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
      <path fill="currentColor" d="M8 1.2 15.2 14H.8L8 1.2Zm-.8 5h1.6v4H7.2v-4Zm0 5h1.6v1.6H7.2v-1.6Z"/>
    </svg>
    <span id="banner_text"></span>
    <button id="banner_close" title="Dismiss">&times;</button>
  </div>

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 20 20" width="18" height="18">
          <g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M3.2 10v.01"/>
            <path d="M6.6 7.2v5.6"/>
            <path d="M10 4.4v11.2"/>
            <path d="M13.4 7.2v5.6"/>
            <path d="M16.8 10v.01"/>
          </g>
        </svg>
      </span>
      <div class="brand-text">
        <h1>RVC <em>Voice Studio</em></h1>
        <p>Realtime voice conversion</p>
      </div>
    </div>
    <div class="status-pill" id="conn_pill" data-state="busy">
      <span class="dot" aria-hidden="true"></span>
      <span id="conn_status">Starting Python backend&hellip;</span>
    </div>
  </header>

  <main>
    <section class="card">
      <h2><span class="num">01</span>Model</h2>
      <div class="row">
        <label>.pth file</label>
        <input id="pth_path" type="text" readonly placeholder="Select a voice model (.pth)" />
        <button id="browse_pth">Browse&hellip;</button>
      </div>
      <div class="row">
        <label>.index file</label>
        <input id="index_path" type="text" readonly placeholder="Select a feature index (.index)" />
        <button id="browse_index">Browse&hellip;</button>
      </div>
    </section>

    <section class="card">
      <h2><span class="num">02</span>Audio devices</h2>
      <div class="row">
        <label>Host API</label>
        <select id="sg_hostapi"></select>
        <label class="switch"><input id="sg_wasapi_exclusive" type="checkbox" /><span>Exclusive WASAPI mode</span></label>
      </div>
      <div class="row">
        <label>Input device</label>
        <select id="sg_input_device"></select>
      </div>
      <div class="row">
        <label>Output device</label>
        <select id="sg_output_device"></select>
      </div>
      <div class="row">
        <label>Sample rate</label>
        <span class="seg">
          <label class="pill"><input type="radio" name="sr_type" id="sr_model" checked /><span>Model rate</span></label>
          <label class="pill"><input type="radio" name="sr_type" id="sr_device" /><span>Device rate</span></label>
        </span>
        <span class="stat"><span class="stat-label">Stream</span><span class="stat-value" id="sr_stream">&ndash;</span></span>
        <span class="row-spring"></span>
        <button id="reload_devices" class="ghost">
          <svg viewBox="0 0 14 14" width="12" height="12" aria-hidden="true">
            <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                  d="M12 7a5 5 0 1 1-1.5-3.6M12 1.4V4H9.4"/>
          </svg>
          Reload devices
        </button>
      </div>
    </section>

    <div class="columns">
      <section class="card">
        <h2><span class="num">03</span>Inference</h2>
        <div class="row slider-row">
          <label>Response threshold</label>
          <input type="range" id="threhold" min="-60" max="0" step="1" value="-60" />
          <span class="val" id="threhold_val">-60</span>
        </div>
        <div class="row slider-row">
          <label>Pitch</label>
          <input type="range" id="pitch" min="-16" max="16" step="1" value="0" />
          <span class="val" id="pitch_val">0</span>
        </div>
        <div class="row slider-row">
          <label>Formant (gender factor)</label>
          <input type="range" id="formant" min="-2" max="2" step="0.05" value="0" />
          <span class="val" id="formant_val">0.00</span>
        </div>
        <div class="row slider-row">
          <label>Index rate</label>
          <input type="range" id="index_rate" min="0" max="1" step="0.01" value="0" />
          <span class="val" id="index_rate_val">0.00</span>
        </div>
        <div class="row slider-row">
          <label>Loudness factor</label>
          <input type="range" id="rms_mix_rate" min="0" max="1" step="0.01" value="0" />
          <span class="val" id="rms_mix_rate_val">0.00</span>
        </div>
        <div class="row">
          <label>Pitch algorithm</label>
          <span class="seg">
            <label class="pill"><input type="radio" name="f0method" value="pm" /><span>pm</span></label>
            <label class="pill"><input type="radio" name="f0method" value="harvest" /><span>harvest</span></label>
            <label class="pill"><input type="radio" name="f0method" value="crepe" /><span>crepe</span></label>
            <label class="pill"><input type="radio" name="f0method" value="rmvpe" checked /><span>rmvpe</span></label>
            <label class="pill"><input type="radio" name="f0method" value="fcpe" /><span>fcpe</span></label>
          </span>
        </div>
      </section>

      <section class="card">
        <h2><span class="num">04</span>Performance</h2>
        <div class="row slider-row">
          <label>Block time (s)</label>
          <input type="range" id="block_time" min="0.02" max="1.5" step="0.01" value="0.25" />
          <span class="val" id="block_time_val">0.25</span>
        </div>
        <div class="row slider-row">
          <label>Harvest processes</label>
          <input type="range" id="n_cpu" min="1" max="8" step="1" value="4" />
          <span class="val" id="n_cpu_val">4</span>
        </div>
        <div class="row slider-row">
          <label>Crossfade length (s)</label>
          <input type="range" id="crossfade_length" min="0.01" max="0.15" step="0.01" value="0.05" />
          <span class="val" id="crossfade_length_val">0.05</span>
        </div>
        <div class="row slider-row">
          <label>Extra inference time (s)</label>
          <input type="range" id="extra_time" min="0.05" max="5" step="0.01" value="2.5" />
          <span class="val" id="extra_time_val">2.50</span>
        </div>
        <div class="row switch-row">
          <label class="switch"><input id="I_noise_reduce" type="checkbox" /><span>Input noise reduction</span></label>
          <label class="switch"><input id="O_noise_reduce" type="checkbox" /><span>Output noise reduction</span></label>
          <label class="switch"><input id="use_pv" type="checkbox" /><span>Phase vocoder</span></label>
        </div>
      </section>
    </div>

    <section class="card control-bar">
      <button id="start_vc" class="primary">
        <svg viewBox="0 0 12 12" width="11" height="11" aria-hidden="true">
          <path fill="currentColor" d="M2.5 1.6v8.8L10.4 6 2.5 1.6Z"/>
        </svg>
        Start conversion
      </button>
      <button id="stop_vc" class="stop" disabled>
        <svg viewBox="0 0 12 12" width="10" height="10" aria-hidden="true">
          <rect fill="currentColor" x="2" y="2" width="8" height="8" rx="1.4"/>
        </svg>
        Stop
      </button>
      <span class="seg">
        <label class="pill"><input type="radio" name="function" value="im" /><span>Monitor input</span></label>
        <label class="pill"><input type="radio" name="function" value="vc" checked /><span>Convert output</span></label>
      </span>
      <span class="row-spring"></span>
      <span class="stat"><span class="stat-label">Latency</span><span class="stat-value"><span id="delay_time">0</span> ms</span></span>
      <span class="stat"><span class="stat-label">Inference</span><span class="stat-value"><span id="infer_time">0</span> ms</span></span>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
